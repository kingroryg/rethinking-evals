# Target LLM configurations
target_models:
  llama3_70b:
    provider: local
    model_path: meta-llama/Meta-Llama-3-70B-Instruct
    temperature: 0.7
    max_tokens: 500
    device_map: auto
    load_in_8bit: true  # Use 8-bit quantization to fit on GPU
    
  llama3_8b:
    provider: local
    model_path: meta-llama/Meta-Llama-3-8B-Instruct
    temperature: 0.7
    max_tokens: 500
    device_map: auto
  
  mistral_7b:
    provider: local
    model_path: mistralai/Mistral-7B-Instruct-v0.2
    temperature: 0.7
    max_tokens: 500
    device_map: auto
    
  gpt_oss_120b:
    provider: local
    model_path: openai/gpt-oss-120b
    temperature: 0.7
    max_tokens: 500
    device_map: auto
    # Uses MXFP4 quantization by default, fits on single H100
    
  kimi_k2:
    provider: local
    model_path: moonshotai/Kimi-K2-Instruct
    temperature: 0.7
    max_tokens: 500
    device_map: auto
    load_in_8bit: true  # 32B activated params from 1T total
    
  # For testing with smaller Kimi variant
  kimi_k2_thinking:
    provider: local
    model_path: moonshotai/Kimi-K2-Thinking
    temperature: 0.7
    max_tokens: 500
    device_map: auto
    load_in_8bit: true

# Judge committee configurations
judge_committee:
  judges:
    - provider: openai
      model_name: gpt-4o
      temperature: 0.0
      max_tokens: 200
    - provider: anthropic
      model_name: claude-3-opus
      temperature: 0.0
      max_tokens: 200
    - provider: openai
      model_name: gpt-4-turbo
      temperature: 0.0
      max_tokens: 200
  alpha: 0.5  # voting weight in aggregation

# Embedding model for behavioral descriptors and semantic interpolation
embedding_model:
  provider: sentence_transformers
  model_name: all-mpnet-base-v2
  
# Mutation LLM (for paraphrasing)
mutation_llm:
  provider: openai
  model_name: gpt-4o-mini
  temperature: 0.8
  max_tokens: 300
